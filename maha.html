<!DOCTYPE html>
<html>
<head>
  <title>A Special Question 💕</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .content {
      text-align: center;
      z-index: 2;
    }

    h1 {
      color: white;
      font-size: 28px;
    }

    #yesBtn, #noBtn {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin: 20px;
      transition: 0.2s;
      position: absolute;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
      left: 45%;
      top: 55%;
    }

    #noBtn {
      background: #444;
      color: white;
    }

    #message {
      margin-top: 20px;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="content">
    <h1>Will you take me on a romantic date this weekend? 💕</h1>
    <div id="message"></div>
  </div>

  <button id="yesBtn" onclick="sayYes()">YES 💖</button>
  <button id="noBtn">NO 🙈</button>

<script>
  const noBtn = document.getElementById("noBtn");

  function moveButton() {
    const windowWidth = window.innerWidth - noBtn.offsetWidth;
    const windowHeight = window.innerHeight - noBtn.offsetHeight;

    const randomX = Math.random() * windowWidth;
    const randomY = Math.random() * windowHeight;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
  }

  noBtn.addEventListener("mouseover", moveButton);
  noBtn.addEventListener("touchstart", moveButton); // for mobile

  function sayYes() {
    document.getElementById("message").innerHTML =
      "I knew it 😍 You can never say no to me!";
  }

  // Initial random position
  moveButton();
</script>

</body>
</html>
