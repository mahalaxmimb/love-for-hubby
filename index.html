<!DOCTYPE html>
<html>
<head>
  <title>A Special Question 💕</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .container {
      text-align: center;
      position: relative;
    }

    h1 {
      color: white;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
    }

    #noBtn {
      background: #444;
      color: white;
      position: relative;
    }

    #message {
      margin-top: 30px;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Will you take me on a romantic date this weekend? 💕</h1>

    <div class="buttons">
      <button id="yesBtn" onclick="sayYes()">YES 💖</button>
      <button id="noBtn">NO 🙈</button>
    </div>

    <div id="message"></div>
  </div>

<script>
  const noBtn = document.getElementById("noBtn");

  function moveButton() {
    // Change to absolute only when hovered
    noBtn.style.position = "absolute";

    const windowWidth = window.innerWidth - noBtn.offsetWidth;
    const windowHeight = window.innerHeight - noBtn.offsetHeight;

    const randomX = Math.random() * windowWidth;
    const randomY = Math.random() * windowHeight;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
  }

  noBtn.addEventListener("mouseover", moveButton);
  noBtn.addEventListener("touchstart", moveButton);

  function sayYes() {
    document.getElementById("message").innerHTML =
      "I knew it 😍 You can never say no to me!";
  }
</script>

</body>
</html>
